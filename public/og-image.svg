<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1f17"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative currency glyphs -->
  <g fill="#4ade80" opacity="0.06" font-family="'Inter', -apple-system, sans-serif" font-weight="800">
    <text x="80" y="200" font-size="220">$</text>
    <text x="980" y="220" font-size="200">€</text>
    <text x="880" y="540" font-size="240">£</text>
    <text x="120" y="580" font-size="200">¥</text>
    <text x="540" y="460" font-size="180">R$</text>
  </g>

  <!-- Brand badge -->
  <g transform="translate(80,110)">
    <rect x="0" y="0" width="220" height="40" rx="20" fill="rgba(74,222,128,0.16)" stroke="#4ade80" stroke-width="1"/>
    <circle cx="20" cy="20" r="5" fill="#4ade80" filter="url(#glow)"/>
    <text x="36" y="27" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="700" fill="#4ade80" letter-spacing="1.5">LIVE DAILY RATES</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80,240)">
    <text font-family="'Inter', -apple-system, sans-serif" font-size="88" font-weight="800" fill="#e8f2eb" letter-spacing="-2">
      <tspan x="0" y="0">About</tspan>
      <tspan x="260" y="0" fill="url(#accent)">Currency</tspan>
    </text>
    <text x="0" y="100" font-family="'Inter', -apple-system, sans-serif" font-size="36" font-weight="500" fill="rgba(232,242,235,0.78)">
      Free currency converter · 21 world currencies
    </text>
    <text x="0" y="150" font-family="'Inter', -apple-system, sans-serif" font-size="26" font-weight="400" fill="rgba(232,242,235,0.55)">
      Live daily rates · 7 languages · No account required
    </text>
  </g>

  <!-- URL -->
  <text x="80" y="570" font-family="'Inter', -apple-system, sans-serif" font-size="22" font-weight="600" fill="#4ade80" letter-spacing="1">currencyabout.com</text>

  <!-- Flags strip -->
  <g transform="translate(80,480)" font-size="48">
    <text x="0" y="0">🇺🇸</text>
    <text x="70" y="0">🇪🇺</text>
    <text x="140" y="0">🇬🇧</text>
    <text x="210" y="0">🇯🇵</text>
    <text x="280" y="0">🇧🇷</text>
    <text x="350" y="0">🇨🇳</text>
    <text x="420" y="0">🇮🇳</text>
  </g>
</svg>
